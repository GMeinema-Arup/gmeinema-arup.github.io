<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "" %}{{ page.title }} &middot; {% endif %}Guus Meinema</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>

<nav class="topnav">
  <div class="wrap">
    <a class="brand" href="{{ '/' | relative_url }}">Guus&nbsp;Meinema</a>
    <button class="navtoggle" aria-label="Menu" aria-expanded="false" aria-controls="navlinks">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="navlinks" id="navlinks">
      <a href="{{ '/' | relative_url }}"{% if page.nav == 'about' %} class="active"{% endif %}>About</a>
      <a href="{{ '/publications/' | relative_url }}"{% if page.nav == 'publications' %} class="active"{% endif %}>Publications</a>
      <a href="{{ '/projects/' | relative_url }}"{% if page.nav == 'projects' %} class="active"{% endif %}>Projects</a>
      <a href="{{ '/cv/' | relative_url }}"{% if page.nav == 'cv' %} class="active"{% endif %}>CV</a>
      <a href="{{ '/contact/' | relative_url }}"{% if page.nav == 'contact' %} class="active"{% endif %}>Contact</a>
    </div>
  </div>
</nav>

<div class="wrap layout">

  <aside class="profile">
    <img class="portrait" src="{{ '/images/profile.jpg' | relative_url }}" alt="Guus Meinema">
    <h2 class="pname"><a href="{{ '/' | relative_url }}">Guus<br>Meinema</a></h2>
    <p class="ptitle">Bridge Engineer @Arup&nbsp;Z&uuml;rich<br>Former student @TU Delft</p>
    <nav class="psocial">
      <a href="mailto:guus.meinema@arup.com">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0-8 5L4 6h16zm0 12H4V8l8 5 8-5v10z"/></svg>
        <span>Email</span></a>
      <a href="https://www.linkedin.com/in/guus-meinema-9266011b4/">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/></svg>
        <span>LinkedIn</span></a>
    </nav>
  </aside>

  <main class="content">
    {{ content }}

    <footer>
      <span>&copy; {{ site.time | date: "%Y" }} Guus Meinema &middot; Arup Z&uuml;rich</span>
      <span><a href="mailto:guus.meinema@arup.com">e-mail</a></span>
    </footer>
  </main>

</div>

<script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
